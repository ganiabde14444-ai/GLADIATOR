<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gladiator Coaching Staff</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Lexend:wght@300;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css.program/Reina Torres.css">
</head>
<body>
    <div class="content-wrapper">
        <a href="coch.html" class="btn-return">
            <span class="icon">←</span> RETURN
        </a>

    <div class="coach-card">
        <div class="card-inner">
            <div class="face face-front">
                <div class="coach-photo" style="background-image: url('https://images.unsplash.com/photo-1548690312-e3b507d8c110?auto=format&fit=crop&w=800&q=80');"></div>
                <div class="name-plate">
                    <h3>Reina Torres</h3>
                    <span>Head of Strength</span>
                </div>
            </div>
            <div class="face face-back">
                <div class="stats-header">Performance Coach</div>
                <ul class="metrics">
                    <li><span class="m-label">Experience</span> <span class="m-value">9 Years</span></li>
                    <li><span class="m-label">Primary Focus</span> <span class="m-value">Athleticism</span></li>
                    <li><span class="m-label">Rank</span> <span class="m-value">Gold Coach</span></li>
                </ul>
                <div class="specialties">
                    <span class="tag">Olympic Lifts</span>
                    <span class="tag">Strength</span>
                    <span class="tag">Body Comp</span>
                </div>
                <a href="contact.html" class="book-link">Book Briefing</a>
            </div>
        </div>
    </div>
    </body>
</html>
